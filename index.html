<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>demoMaker BETA – Online DAW</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="demomaker.css">
</head>

<body>
 <div class="wrapper">

    <header class="topbar">
    <div class="logo">
        <h1>demoMaker <span>BETA</span></h1>
    </div>

    <div id="authBox">
    <div id="authStatusButton">Nincs bejelentkezve</div>
    <div id="authDropdown">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Jelszó">
        <button id="loginBtn">Bejelentkezés</button>
        <button id="registerBtn">Regisztráció</button>
        <button id="logoutBtn" style="display:none;">Kilépés</button>
    </div>
    </div>
    </header>

   <div class="track-actions">
        <div class="add-track-wrap">

         <button class="add-track" id="addTrackBtn">
             <span>+</span>
             add track
         </button>

        <div class="track-picker" id="trackPicker">
          <button data-type="drum">drum</button>
          <button data-type="bass">bass</button>
          <button data-type="synth">synth</button>
          <button data-type="guitar">guitar</button>
          <button data-type="vocal">vocal</button>
          <button data-type="sample">sample</button>
        </div>
       </div>

       <button class="project-btn">New</button>
       <button class="project-btn">Save</button>
       <div style="position: relative; display: inline-block;">
           <button class="project-btn" id="openMenuBtn">Open</button>
           <div class="track-picker" id="openPicker" style="min-width: 120px; top: 110%; left: 0;">
               <button id="openLocalBtn">From PC</button>
               <button id="openCloudBtn">From Cloud</button>
           </div>
       </div>
       <button class="project-btn">Cloud</button>
       <button class="project-btn">Import</button>
       <button class="project-btn">Export</button>
        
    </div>
    <input type="file" id="projectImportInput" accept=".json" style="display: none;">
    <input type="file" id="audioImportInput" accept="audio/*" style="display: none;">
    
    <div class="control-panel">
       <button id="enableAudioBtn">Enable Audio</button>
       <button class="loop-btn">
       Loop
       </button>
       <button class="rewind-btn" title="Return to Start">
        <svg width="16" height="16" viewBox="0 0 16 16">
         <path d="M2 3v10h2V3H2zm11 10L6 8l7-5v10z" fill="currentColor"/>
        </svg>
       </button>
       <button class="play-btn">
        <svg width="16" height="16" viewBox="0 0 16 16">
         <polygon points="3,2 13,8 3,14" fill="currentColor"/>
        </svg>
       </button>
       <button class="rec-btn">
        <svg width="16" height="16" viewBox="0 0 16 16">
         <circle cx="8" cy="8" r="6" fill="currentColor"/>
        </svg>
       </button>
       <button class="click-btn">
       Click
       </button>
       <div class="bpm-wrap">
        <input type="text" class="bpm-input" value="120" maxlength="3">
       </div>
       <div class="time-signature-wrap">
        <input type="text" class="time-signature-input" value="4/4" maxlength="5">
       </div>
       <div class="grid-wrap">
        <button class="grid-btn">1/8</button>

        <div class="grid-dropdown">
         <button data-grid="1/4">1/4</button>
         <button data-grid="1/4T">1/4T</button>
         <button data-grid="1/8" class="active">1/8</button>
         <button data-grid="1/8T">1/8T</button>
         <button data-grid="1/16">1/16</button>
         <button data-grid="1/16T">1/16T</button>
         <button data-grid="1/32">1/32</button>
         <button data-grid="1/64">1/64</button>
        </div>
       </div>
       <button class="snap-btn" title="Snap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <line x1="12" y1="5" x2="12" y2="19"/>
  
         <line x1="4" y1="12" x2="10" y2="12"/>
         <polyline points="8,10 10,12 8,14"/>
  
         <line x1="20" y1="12" x2="14" y2="12"/>
         <polyline points="16,10 14,12 16,14"/>
        </svg>
       </button>
       <button class="select-btn" title="Select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <rect x="4" y="6" width="16" height="12" stroke-dasharray="4 3"/>
        </svg>
       </button>
       <button class="cut-btn" title="Cut">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
         <circle cx="6" cy="6" r="3"/>
         <circle cx="6" cy="18" r="3"/>
         <path d="M20 4L8.5 14.5"/>
         <path d="M20 20L8.5 9.5"/>
        </svg>
       </button>
       <button class="duplicate-btn" title="Duplicate">
        <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
         <rect x="10" y="10" width="22" height="22" rx="3"
         stroke="currentColor" stroke-width="3"/>
         <rect x="16" y="16" width="22" height="22" rx="3"
         stroke="currentColor" stroke-width="3"/>
        </svg>
       </button>
       <button class="delete-btn" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
         <path d="M4 7H20"/>
         <path d="M9 7V4H15V7"/>
         <rect x="6" y="7" width="12" height="13" rx="2"/>
         <path d="M10 11V17M14 11V17"/>
        </svg>
       </button>
       <button class="play-time-btn">00:00.00
       </button>
    </div>

    <main>

        <div class="track-list" id="trackList">
           <div class="timeline-ruler" id="timelineRuler">
               <div class="ruler-inner" id="rulerInner">
                    <div id="loopRegion" class="loop-region" style="display: none;">
                        <div class="loop-handle left" data-side="left"></div>
                        <div class="loop-handle right" data-side="right"></div>
                    </div>
               </div>
           </div>
           <div class="timeline-scroll" id="timelineScroll"></div>
           <div id="playhead"></div>

           <div class="zoom-container" id="zoomContainer" style="display: none;">
            <label>
             <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="11" y1="8" x2="11" y2="14"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
             </svg>
             <input type="range" id="zoomSlider" min="0.2" max="1.8" step="0.05" value="1.0">
             <span id="zoomValueDisplay" class="slider-value">1.0x</span>
             </label>
            </div>
        </div>

    </main>

    <div class="mixer-panel" id="mixerPanel">
        <div class="mixer-tracks-container" id="mixerTracks">
        </div>
        
        <div class="mixer-master-container">
            <div class="mixer-channel master-channel" data-track-id="master">
                <div class="mix-header">MASTER</div>
                <div class="mix-inserts">Inserts</div>

                <div class="master-meter-container">
                    <div class="clip-led" title="Kattints a törléshez"></div>
                    <div class="master-meter-wrap">
                        <div class="vu-meter-bg master-vu"></div>
                    </div>
                </div>

                <div class="mix-pan-wrap">
                    <input type="range" min="-50" max="50" value="0" class="master-pan-slider mini-pan-fader">
                </div>
                <div class="fader-wrapper">
                    <input type="range" min="0" max="100" value="80" class="master-vol-slider vertical-fader">
                </div>
                <div class="mix-val master-vol-val">80%</div>
            </div>
        </div>
    </div>

    

    <footer>
        © 2026 demoMaker – Tape vibes. Modern tools.
    </footer>

   <div id="seq-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div id="seq-modal" style="background: #111; border: 2px solid #3fa9f5; border-radius: 6px; width: 90%; max-width: 800px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2 id="seq-title" style="margin: 0; font-family: var(--font-mono); font-size: 1.2rem; text-transform: uppercase;">Editor</h2>
                <select id="preset-selector" style="background: #222; color: #fff; border: 1px solid #555; padding: 4px 8px; font-family: var(--font-mono); border-radius: 3px; outline: none; cursor: pointer; display: none;">
                </select>
            </div>
            <button id="close-seq-btn" style="background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">×</button>
        </div>
        
        <div id="seq-grid" style="display: flex; flex-direction: column; gap: 4px; overflow-x: auto;">
            </div>

    </div>
</div>
 </div>

<script src="fx-engine.js"></script> 

<script src="demomaker.js"></script> 

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

// --- Firebase Konfiguráció ---
const firebaseConfig = {
  apiKey: "AIzaSyDFK6o6sJnFJImBhkX_ZfQq6fXldLZt7vA",
  authDomain: "calendarformeapp.firebaseapp.com",
  projectId: "calendarformeapp",
  storageBucket: "calendarformeapp.firebasestorage.app",
  messagingSenderId: "421913143205",
  appId: "1:421913143205:web:24dc04f3c768f99356aa4c"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// --- Auth ---
const emailInput = document.getElementById('email');
const passInput = document.getElementById('password');
const logoutBtn = document.getElementById('logoutBtn');
const authStatusButton = document.getElementById("authStatusButton");
const authDropdown = document.getElementById("authDropdown");

document.getElementById('loginBtn').onclick = async () => {
  try { await signInWithEmailAndPassword(auth, emailInput.value, passInput.value); } 
  catch(e){ alert("Hiba: "+e.message); }
};
document.getElementById('registerBtn').onclick = async () => {
  try { await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value); alert("Regisztráció sikeres"); } 
  catch(e){ alert("Hiba: "+e.message); }
};
logoutBtn.onclick = async () => { await signOut(auth); };

authStatusButton.onclick = () => { authDropdown.classList.toggle("open"); };
document.addEventListener("click", (e) => {
    if (!authBox.contains(e.target)) authDropdown.classList.remove("open");
});
onAuthStateChanged(auth, user => {
    if (user) {
        authStatusButton.textContent = user.email;
        logoutBtn.style.display = "block";
    } else {
        authStatusButton.textContent = "Nincs bejelentkezve";
        logoutBtn.style.display = "none";
    }
});


// --- Cloud mentés ---
document.querySelectorAll('.project-btn').forEach(btn => {
    if (btn.textContent === 'Cloud') {
        btn.onclick = async () => {
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.style.color = '#00ffd5'; 

            try {
                // 1. Projekt adatok JSON-ná alakítása
                const projectData = window.serializeProject(); 
                const jsonString = JSON.stringify(projectData);

                // 2. Blob fájl létrehozása
                const blob = new Blob([jsonString], { type: 'application/json' });

                // 3. FormData összerakása (A Multer a "file" kulcsot várja)
                const formData = new FormData();
                formData.append("file", blob, "demomaker_project.json");

                // 4. Küldés a TE RENDER BACKENDEDRE! 
                // (Írd át a saját Render URL-edre)
                const backendUrl = "https://music-backend-jq1s.onrender.com/upload-project";
                
                const response = await fetch(backendUrl, {
                    method: "POST",
                    body: formData
                });

                // 1. NE egyből json()-t csináljunk, hanem olvassuk be nyers szövegként!
                const responseText = await response.text();
                
                // 2. Írjuk ki a konzolba, hátha egy beszédes hibaoldal (pl. "Not Found")
                console.log("A szerver nyers válasza:", responseText);

                if (!response.ok) {
                    throw new Error(`Szerver hiba kód: ${response.status}. Nézd meg a böngésző konzolját (F12)!`);
                }

                // 3. Ha minden OK, akkor csinálunk belőle JSON-t
                const data = JSON.parse(responseText);

                if (data.url) {
                    console.log("Projekt mentve! URL:", data.url);
                    
                    try {
                        // Megpróbáljuk automatikusan a vágólapra másolni
                        await navigator.clipboard.writeText(data.url);
                        alert("A projekt sikeresen mentve a felhőbe!\n\nA link automatikusan a vágólapodra lett másolva:\n" + data.url);
                    } catch (err) {
                        // Ha a böngésző nem engedi az auto-másolást, adunk egy kijelölhető szövegdobozt
                        prompt("A projekt sikeresen mentve a felhőbe!\nMásold ki az alábbi linket (Ctrl+C / Hosszan nyomás):", data.url);
                    }
                }

            } catch(e) {
                console.error(e);
                alert("Hiba a mentésnél: " + e.message);
            }

            // Gomb visszaállítása
            btn.textContent = originalText;
            btn.style.color = '';
        };
    }
});

// --- PROJEKT BETÖLTÉSE (DESERIALIZÁCIÓ) ---
window.loadProject = async function(projectData) {
    if (!projectData || !projectData.tracks) return;

    // 1. Tiszta lap: Töröljük a jelenlegi sávokat
    document.querySelectorAll('.track-container').forEach(t => t.remove());
    document.querySelectorAll('.mixer-channel:not(.master-channel)').forEach(m => m.remove());
    trackCounter = 0;
    
    const rulerEl = document.getElementById('timelineRuler');
    rulerEl.style.display = 'none';

    // 2. Globális beállítások (BPM, Ütemmutató)
    if (projectData.bpm) {
        bpm = projectData.bpm;
        document.querySelector('.bpm-input').value = bpm;
    }
    if (projectData.timeSig) {
        timeSig = projectData.timeSig;
        document.querySelector('.time-signature-input').value = `${timeSig[0]}/${timeSig[1]}`;
    }

    // 3. Sávok újraépítése
    for (const tData of projectData.tracks) {
        createTrack(tData.type); // Létrehozza a HTML-t és a DSP láncot
        
        // A legutoljára létrehozott sáv az, amivel épp dolgozunk
        const tracks = document.querySelectorAll('.track-container');
        const newTrack = tracks[tracks.length - 1];
        const trackId = newTrack.dataset.trackId;
        const mixerChan = document.querySelector(`.mixer-channel[data-track-id="${trackId}"]`);

        // Név és Preset
        newTrack.querySelector('.track-name').textContent = tData.name;
        if (mixerChan) mixerChan.querySelector('.mix-header').textContent = tData.name;
        newTrack.dataset.preset = tData.preset || '';

        // Csúszkák (Vol, Pan) beállítása
        const volSlider = newTrack.querySelector('.trk-vol-slider');
        if (volSlider && tData.vol !== undefined) {
            volSlider.value = tData.vol;
            volSlider.nextElementSibling.textContent = tData.vol + '%';
            if (mixerChan) {
                mixerChan.querySelector('.mix-vol-slider').value = tData.vol;
                mixerChan.querySelector('.mix-val').textContent = tData.vol + '%';
            }
            if (newTrack.trackGainNode) newTrack.trackGainNode.gain.value = tData.vol / 100;
        }

        const panSlider = newTrack.querySelector('.trk-pan-slider');
        if (panSlider && tData.pan !== undefined) {
            panSlider.value = tData.pan;
            panSlider.nextElementSibling.textContent = tData.pan;
            if (mixerChan) mixerChan.querySelector('.mix-pan-slider').value = tData.pan;
            if (newTrack.trackPannerNode) newTrack.trackPannerNode.pan.value = tData.pan / 50;
        }

        // Sidechain / Pump beállítása
        const scSlider = newTrack.querySelector('.trk-sc-slider');
        if (scSlider && tData.scAmount !== undefined) {
            scSlider.value = tData.scAmount;
            scSlider.nextElementSibling.textContent = tData.scAmount + '%';
            const pumpBtn = newTrack.querySelector('.pump-btn');
            if (pumpBtn) {
                if (tData.scAmount > 0) pumpBtn.classList.add('engaged');
                else pumpBtn.classList.remove('engaged');
            }
        }

        // Kották (Pattern Klipek) visszaállítása
        const clipsContainer = newTrack.querySelector('.clips');
        if (tData.clips) {
            tData.clips.forEach(cData => {
                if (cData.type === 'pattern') {
                    const newClip = addPatternClipToTrack(clipsContainer, "Pattern", cData.start, cData.patternData.lengthInBars);
                    newClip.patternData = cData.patternData; // Visszaírjuk a kottát
                    newClip.dataset.duration = cData.duration;
                    newClip.style.width = `${cData.duration * PX_PER_SECOND}px`;
                    
                    // Újrarajzoljuk a bogyókat a sávon
                    let waveColor = '#b084f7';
                    if (tData.type === 'drum') waveColor = '#3fa9f5';
                    else if (tData.type === 'bass') waveColor = '#ffd93d';
                    else if (tData.type === 'guitar') waveColor = '#00ffd5';
                    else if (tData.type === 'vocal') waveColor = '#ff7ac8';
                    else if (tData.type === 'sample') waveColor = '#ff8c00';
                    else if (tData.type === 'synth') waveColor = '#b084f7';
                    
                    const canvas = newClip.querySelector('canvas');
                    canvas.width = cData.duration * PX_PER_SECOND;
                    drawPattern(canvas, newClip, waveColor);
                }
            });
        }
        
        // --- PRO TIPP: Az effektek visszaépítését ideális esetben itt csinálnánk 
        // egy pluginMapper segítségével, de ez az alapszerkezet is hibátlanul beolvassa a DAW-ot! ---
    }

    drawRuler();
    drawAllGrids();
    updateZoomVisibility();
    updatePlayheadVisuals();
    
    // UI Frissítés
    document.getElementById('openPicker').classList.remove('show');
    alert("Projekt sikeresen betöltve!");
};

// --- LOKÁLIS MENTÉS (Save to PC) ---
document.querySelectorAll('.project-btn').forEach(btn => {
    if (btn.textContent === 'Save') {
        btn.onclick = () => {
            try {
                // 1. Kinyerjük az adatokat
                const projectData = window.serializeProject(); 
                const jsonString = JSON.stringify(projectData, null, 2); // Szépen formázott JSON
                
                // 2. Fájlt csinálunk belőle a memóriában
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // 3. Egy láthatatlan linkkel rákényszerítjük a böngészőt a letöltésre
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'demomaker_project.json'; // Ez lesz a fájlnév
                document.body.appendChild(a);
                a.click();
                
                // 4. Takarítás
                URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                console.error(err);
                alert("Hiba a mentés során: " + err.message);
            }
        };
    }
});

// --- 1. MEGYITÁS GÉPRŐL (Local JSON) ---
const openLocalBtn = document.getElementById('openLocalBtn');
const projectImportInput = document.getElementById('projectImportInput');

openLocalBtn.addEventListener('click', () => {
    projectImportInput.click(); // Megnyitja a Windows fájlkezelőt
});

projectImportInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const projectData = JSON.parse(event.target.result);
            window.loadProject(projectData);
        } catch (err) {
            alert("Hiba a fájl olvasásakor: Nem érvényes demoMaker projekt.");
        }
    };
    reader.readAsText(file);
    projectImportInput.value = ''; // Reset
});

// --- 2. MEGNYITÁS FELHŐBŐL (Cloudinary URL) ---
const openCloudBtn = document.getElementById('openCloudBtn');

openCloudBtn.addEventListener('click', async () => {
    const url = prompt("Kérlek, illeszd be a projekt Cloudinary URL-jét:");
    
    if (!url) return;
    
    // Biztonsági ellenőrzés
    if (!url.startsWith("http")) {
        alert("Ez nem tűnik érvényes URL-nek.");
        return;
    }

    try {
        const originalText = openCloudBtn.textContent;
        openCloudBtn.textContent = 'Loading...';
        
        // Letöltjük a JSON fájlt a megadott URL-ről
        const response = await fetch(url);
        if (!response.ok) throw new Error("Nem sikerült letölteni a projektet.");
        
        const projectData = await response.json();
        
        // Átadjuk a motornak!
        window.loadProject(projectData);
        
        openCloudBtn.textContent = originalText;
    } catch (err) {
        alert("Hiba a felhőből való betöltéskor:\n" + err.message);
        openCloudBtn.textContent = 'From Cloud';
    }
});

document.getElementById('openMenuBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('openPicker').classList.toggle('show');
});

</script>

</body>
</html>
